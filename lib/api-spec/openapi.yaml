openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: E-Commerce Analytics & Recommendation System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: products
    description: Product management
  - name: customers
    description: Customer management
  - name: orders
    description: Order management
  - name: analytics
    description: Sales and business analytics
  - name: recommendations
    description: Product recommendations
  - name: forecasting
    description: Sales forecasting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # PRODUCTS
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/top-selling:
    get:
      operationId: getTopSellingProducts
      tags: [products]
      summary: Get top selling products
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Top selling products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSalesStat"

  /products/category-performance:
    get:
      operationId: getCategoryPerformance
      tags: [products]
      summary: Category-wise sales performance
      responses:
        "200":
          description: Category performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryPerformance"

  # CUSTOMERS
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - in: query
          name: segment
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"

  /customers/segments:
    get:
      operationId: getCustomerSegments
      tags: [customers]
      summary: Get RFM customer segments summary
      responses:
        "200":
          description: Segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerSegment"

  /customers/retention:
    get:
      operationId: getRetentionMetrics
      tags: [customers]
      summary: Customer retention metrics
      responses:
        "200":
          description: Retention
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionMetrics"

  # ORDERS
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ANALYTICS
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Overall analytics summary (KPIs)
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Revenue over time
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [daily, weekly, monthly]
        - in: query
          name: from
          schema:
            type: string
        - in: query
          name: to
          schema:
            type: string
      responses:
        "200":
          description: Revenue data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

  /analytics/sales-report:
    get:
      operationId: getSalesReport
      tags: [analytics]
      summary: Detailed sales report
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [daily, monthly]
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesReport"

  /analytics/profit:
    get:
      operationId: getProfitAnalysis
      tags: [analytics]
      summary: Profit analysis
      responses:
        "200":
          description: Profit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitAnalysis"

  /analytics/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Recent order activity feed
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # RECOMMENDATIONS
  /recommendations/personalized/{userId}:
    get:
      operationId: getPersonalizedRecommendations
      tags: [recommendations]
      summary: Personalized product recommendations for user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductRecommendation"

  /recommendations/similar/{productId}:
    get:
      operationId: getSimilarProducts
      tags: [recommendations]
      summary: Similar products
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Similar products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductRecommendation"

  /recommendations/trending:
    get:
      operationId: getTrendingProducts
      tags: [recommendations]
      summary: Trending products
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Trending products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductRecommendation"

  /recommendations/bought-together/{productId}:
    get:
      operationId: getFrequentlyBoughtTogether
      tags: [recommendations]
      summary: Frequently bought together products
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Frequently bought together
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductRecommendation"

  # FORECASTING
  /forecasting/sales:
    get:
      operationId: getSalesForecast
      tags: [forecasting]
      summary: Sales forecast
      parameters:
        - in: query
          name: periods
          schema:
            type: integer
        - in: query
          name: granularity
          schema:
            type: string
            enum: [daily, weekly, monthly]
      responses:
        "200":
          description: Sales forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastPoint"

  /forecasting/demand/{productId}:
    get:
      operationId: getDemandForecast
      tags: [forecasting]
      summary: Demand forecast for a product
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Demand forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastPoint"

  /forecasting/inventory:
    get:
      operationId: getInventoryForecast
      tags: [forecasting]
      summary: Inventory level forecast
      responses:
        "200":
          description: Inventory forecast
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryForecast"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, customer]

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    Product:
      type: object
      required: [id, name, category, price, stock, rating]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
        stock:
          type: integer
        rating:
          type: number
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, category, price, stock]
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        stock:
          type: integer
        rating:
          type: number
        description:
          type: string
        imageUrl:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        stock:
          type: integer
        rating:
          type: number
        description:
          type: string
        imageUrl:
          type: string

    ProductList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductSalesStat:
      type: object
      required: [id, name, category, totalSold, revenue, rating]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number
        rating:
          type: number

    CategoryPerformance:
      type: object
      required: [category, totalSales, revenue, productCount, avgRating]
      properties:
        category:
          type: string
        totalSales:
          type: integer
        revenue:
          type: number
        productCount:
          type: integer
        avgRating:
          type: number

    Customer:
      type: object
      required: [id, name, email, totalOrders, totalSpent, segment, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        totalOrders:
          type: integer
        totalSpent:
          type: number
        segment:
          type: string
        clv:
          type: number
        lastOrderDate:
          type: ["string", "null"]
        createdAt:
          type: string

    CustomerDetail:
      type: object
      required: [id, name, email, totalOrders, totalSpent, segment, createdAt, recentOrders, rfmScore]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        totalOrders:
          type: integer
        totalSpent:
          type: number
        segment:
          type: string
        clv:
          type: number
        lastOrderDate:
          type: ["string", "null"]
        createdAt:
          type: string
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        rfmScore:
          $ref: "#/components/schemas/RFMScore"

    CustomerList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CustomerSegment:
      type: object
      required: [segment, count, avgClv, avgOrderValue, percentage]
      properties:
        segment:
          type: string
        count:
          type: integer
        avgClv:
          type: number
        avgOrderValue:
          type: number
        percentage:
          type: number

    RetentionMetrics:
      type: object
      required: [retentionRate, churnRate, avgPurchaseFrequency, avgDaysBetweenOrders, repeatCustomerRate]
      properties:
        retentionRate:
          type: number
        churnRate:
          type: number
        avgPurchaseFrequency:
          type: number
        avgDaysBetweenOrders:
          type: number
        repeatCustomerRate:
          type: number

    RFMScore:
      type: object
      required: [recency, frequency, monetary, total]
      properties:
        recency:
          type: integer
        frequency:
          type: integer
        monetary:
          type: integer
        total:
          type: integer

    Order:
      type: object
      required: [id, userId, totalAmount, orderDate, items]
      properties:
        id:
          type: integer
        userId:
          type: integer
        customerName:
          type: ["string", "null"]
        totalAmount:
          type: number
        orderDate:
          type: string
        status:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderItem:
      type: object
      required: [id, productId, productName, quantity, price]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number

    OrderInput:
      type: object
      required: [userId, items]
      properties:
        userId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    OrderList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    AnalyticsSummary:
      type: object
      required: [totalRevenue, totalOrders, totalCustomers, totalProducts, avgOrderValue, revenueGrowth, ordersGrowth, customersGrowth]
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalCustomers:
          type: integer
        totalProducts:
          type: integer
        avgOrderValue:
          type: number
        revenueGrowth:
          type: number
        ordersGrowth:
          type: number
        customersGrowth:
          type: number

    RevenueDataPoint:
      type: object
      required: [date, revenue, orders]
      properties:
        date:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    SalesReport:
      type: object
      required: [period, revenue, orders, avgOrderValue, topProduct]
      properties:
        period:
          type: string
        revenue:
          type: number
        orders:
          type: integer
        avgOrderValue:
          type: number
        topProduct:
          type: string

    ProfitAnalysis:
      type: object
      required: [totalRevenue, estimatedCost, grossProfit, grossMargin, byCategory]
      properties:
        totalRevenue:
          type: number
        estimatedCost:
          type: number
        grossProfit:
          type: number
        grossMargin:
          type: number
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryProfit"

    CategoryProfit:
      type: object
      required: [category, revenue, cost, profit, margin]
      properties:
        category:
          type: string
        revenue:
          type: number
        cost:
          type: number
        profit:
          type: number
        margin:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, amount, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        amount:
          type: ["number", "null"]
        customerName:
          type: ["string", "null"]
        timestamp:
          type: string

    ProductRecommendation:
      type: object
      required: [id, name, category, price, rating, score, reason]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
        rating:
          type: number
        score:
          type: number
        reason:
          type: string
        imageUrl:
          type: ["string", "null"]

    ForecastPoint:
      type: object
      required: [date, predicted, lower, upper]
      properties:
        date:
          type: string
        predicted:
          type: number
        lower:
          type: number
        upper:
          type: number
        actual:
          type: ["number", "null"]

    InventoryForecast:
      type: object
      required: [productId, productName, currentStock, predictedDemand, reorderPoint, daysUntilStockout, recommendation]
      properties:
        productId:
          type: integer
        productName:
          type: string
        currentStock:
          type: integer
        predictedDemand:
          type: number
        reorderPoint:
          type: integer
        daysUntilStockout:
          type: ["number", "null"]
        recommendation:
          type: string
